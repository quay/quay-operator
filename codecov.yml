codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "40...100"

  status:
    project:
      default:
        target: auto
    patch:
      default:
        target: auto

parsers:
  go:
    partials_as_hits: true

ignore:
  - "vendor/**"
  - "**/zz_generated*.go"
  - "**/*_test.go"
  - "config/**"
  - "hack/**"
  - "docs/**"
  - "test/**"
  - "bundle/**"

flags:
  unit-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
