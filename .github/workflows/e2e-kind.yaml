---
name: E2E KinD

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-kind-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-kind:
    name: E2E Tests on KinD
    runs-on: quay-002-small-ubuntu-24-x64
    env:
      SKIP_RESOURCE_REQUESTS: "true"
      QUAY_VERSION: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install crane
        run: go install github.com/google/go-containerregistry/cmd/crane@v0.21.3

      - name: Build operator
        run: go build -o bin/manager main.go

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: quay-e2e
          config: hack/kind-config.yaml

      - name: Install CRDs
        run: make install

      - name: Setup Garage S3
        run: bash hack/setup-kind-e2e.sh

      - name: Run operator in background
        run: |
          ./bin/manager > /tmp/operator.log 2>&1 &
          echo $! > /tmp/operator.pid
          curl -sf --retry 10 --retry-delay 1 --retry-connrefused http://localhost:8081/readyz

      - name: Run E2E tests
        run: |
          mkdir -p /tmp/e2e-reports
          make test-e2e-kind \
            CHAINSAW_REPORT_FORMAT=JUNIT-STEP \
            CHAINSAW_REPORT_PATH=/tmp/e2e-reports \
            CHAINSAW_EXTRA_ARGS="--skip-delete"
        timeout-minutes: 30

      - name: Stop operator
        if: always()
        run: |
          if [ -f /tmp/operator.pid ]; then
            kill $(cat /tmp/operator.pid) 2>/dev/null || true
          fi

      - name: Collect diagnostic logs
        if: always()
        run: |
          exec > >(tee /tmp/e2e-reports/diagnostics.log) 2>&1
          echo "=== Pod status (all namespaces) ==="
          kubectl get pods -A -o wide || true
          echo ""
          echo "=== QuayRegistry status ==="
          kubectl get quayregistries -A -o yaml 2>/dev/null || true
          echo ""
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50 || true
          echo ""
          echo "=== Operator logs (last 100 lines) ==="
          tail -100 /tmp/operator.log 2>/dev/null || true
          echo ""
          echo "=== Chainsaw namespace resources ==="
          for ns in $(kubectl get ns -o name | grep chainsaw | sed 's|namespace/||'); do
            echo "--- $ns: pod describe ---"
            kubectl describe pods -n "$ns" 2>/dev/null || true
            echo "--- $ns: pod logs ---"
            for pod in $(kubectl get pods -n "$ns" -o name 2>/dev/null); do
              echo "--- $ns/$pod ---"
              kubectl logs -n "$ns" "$pod" --all-containers --tail=50 2>/dev/null || true
              echo "--- $ns/$pod (previous) ---"
              kubectl logs -n "$ns" "$pod" --all-containers --previous --tail=50 2>/dev/null || true
            done
          done

      - name: Publish JUnit test report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: '/tmp/e2e-reports/chainsaw-report.xml'
          check_name: 'E2E Test Results (KinD)'
          fail_on_failure: false
          require_tests: false
          include_passed: true
          detailed_summary: true

      - name: Write job summary
        if: always()
        run: |
          REPORT="/tmp/e2e-reports/chainsaw-report.xml"
          if [ ! -f "$REPORT" ]; then
            echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Warning:** No JUnit report was generated. Chainsaw may have crashed before producing output." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python3 - "$REPORT" <<'PYEOF'
          import sys
          import xml.etree.ElementTree as ET
          import os

          report = sys.argv[1]
          tree = ET.parse(report)
          root = tree.getroot()

          suites = root.findall('.//testsuite') if root.tag == 'testsuites' else [root]

          total = 0
          passed = 0
          failed = 0
          skipped = 0
          failures = []

          for suite in suites:
              for tc in suite.findall('testcase'):
                  total += 1
                  fail_el = tc.find('failure')
                  skip_el = tc.find('skipped')
                  if fail_el is not None:
                      failed += 1
                      msg = fail_el.get('message', fail_el.text or 'no message')
                      if len(msg) > 500:
                          msg = msg[:500] + '...'
                      failures.append({
                          'suite': tc.get('classname', suite.get('name', '?')),
                          'test': tc.get('name', '?'),
                          'message': msg,
                      })
                  elif skip_el is not None:
                      skipped += 1
                  else:
                      passed += 1

          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_file, 'a') as out:
              icon = ':white_check_mark:' if failed == 0 else ':x:'
              out.write(f'## {icon} E2E Test Results (KinD)\n\n')
              out.write(f'| Total | Passed | Failed | Skipped |\n')
              out.write(f'|-------|--------|--------|---------|\n')
              out.write(f'| {total} | {passed} | {failed} | {skipped} |\n\n')

              if failures:
                  out.write('### Failures\n\n')
                  for f_item in failures:
                      out.write(f'<details>\n<summary><code>{f_item["suite"]} / {f_item["test"]}</code></summary>\n\n')
                      out.write(f'```\n{f_item["message"]}\n```\n\n')
                      out.write('</details>\n\n')
          PYEOF

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            /tmp/e2e-reports/chainsaw-report.xml
            /tmp/e2e-reports/diagnostics.log
            /tmp/operator.log
          retention-days: 14
          if-no-files-found: warn
