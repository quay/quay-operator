apiVersion: v1
kind: Secret
metadata:
  name: external-tls-cert
type: kubernetes.io/tls
data:
  # Self-signed test cert/key (base64-encoded PEM)
  tls.crt: 
  tls.key: 
---
apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: external-tls
spec:
  tls:
    secretRef:
      name: external-tls-cert
  components:
    - kind: monitoring
      managed: false
    - kind: mirror
      managed: false
    - kind: horizontalpodautoscaler
      managed: false
    - kind: clair
      managed: false
    - kind: clairpostgres
      managed: false
