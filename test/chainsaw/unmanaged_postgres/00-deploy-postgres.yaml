---
apiVersion: v1
kind: Service
metadata:
  name: external-postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app: external-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-postgres
  template:
    metadata:
      labels:
        app: external-postgres
    spec:
      containers:
      - name: postgres
        image: quay.io/sclorg/postgresql-13-c9s:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRESQL_USER
          value: quay
        - name: POSTGRESQL_PASSWORD
          value: quaypass
        - name: POSTGRESQL_DATABASE
          value: quay
        - name: POSTGRESQL_ADMIN_PASSWORD
          value: quaypass
        - name: POSTGRESQL_SHARED_BUFFERS
          value: 256MB
        - name: POSTGRESQL_MAX_CONNECTIONS
          value: "2000"
        readinessProbe:
          exec:
            command:
            - /usr/libexec/check-container
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            memory: 512Mi
