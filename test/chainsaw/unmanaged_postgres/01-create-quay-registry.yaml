apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: unmanaged-pg
spec:
  configBundleSecret: unmanaged-pg-config
  components:
  - kind: quay
    managed: true
  - kind: clair
    managed: false
  - kind: postgres
    managed: false
  - kind: clairpostgres
    managed: false
  - kind: redis
    managed: true
  - kind: mirror
    managed: true
  - kind: horizontalpodautoscaler
    managed: false
  - kind: objectstorage
    managed: ($values.managedObjectStorage)
  - kind: route
    managed: ($values.managedRoute)
  - kind: monitoring
    managed: ($values.managedMonitoring)
  - kind: tls
    managed: ($values.managedTLS)
