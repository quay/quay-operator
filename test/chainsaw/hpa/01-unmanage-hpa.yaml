apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: hpa
spec:
  configBundleSecret: ($values.configBundle)
  components:
  - kind: quay
    managed: true
    overrides:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: quay-component
                  operator: In
                  values:
                  - quay-app
              topologyKey: kubernetes.io/hostname
  - kind: clair
    managed: true
    overrides:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: quay-component
                  operator: In
                  values:
                  - clair-app
              topologyKey: kubernetes.io/hostname
  - kind: postgres
    managed: true
  - kind: redis
    managed: true
  - kind: mirror
    managed: false
  - kind: clairpostgres
    managed: true
  - kind: horizontalpodautoscaler
    managed: false
  - kind: objectstorage
    managed: ($values.managedObjectStorage)
  - kind: route
    managed: ($values.managedRoute)
  - kind: monitoring
    managed: ($values.managedMonitoring)
  - kind: tls
    managed: ($values.managedTLS)
