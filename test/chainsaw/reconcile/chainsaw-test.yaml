# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  creationTimestamp: null
  name: reconcile
spec:
  steps:
  - name: create-registry
    try:
    - script:
        content: |
          # Create config bundle for KinD (no-op on OpenShift)
          if kubectl api-resources 2>/dev/null | grep route.openshift.io >/dev/null; then
            echo "OpenShift detected, skipping config bundle setup"
            exit 0
          fi
          echo "KinD detected, creating config bundle..."
          ACCESS_KEY=$(kubectl get configmap garage-creds -n garage-system -o jsonpath='{.data.access-key}')
          SECRET_KEY=$(kubectl get configmap garage-creds -n garage-system -o jsonpath='{.data.secret-key}')
          BUCKET=$(kubectl get configmap garage-creds -n garage-system -o jsonpath='{.data.bucket}')
          ENDPOINT=$(kubectl get configmap garage-creds -n garage-system -o jsonpath='{.data.endpoint}')
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
            -keyout /tmp/ssl-${NAMESPACE}.key -out /tmp/ssl-${NAMESPACE}.cert -days 1 \
            -subj "/O=Quay E2E" \
            -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" 2>/dev/null
          CONFIG=$(cat <<CFGEOF
          FEATURE_MAILING: false
          SERVER_HOSTNAME: "127.0.0.1:30443"
          PREFERRED_URL_SCHEME: https
          WORKER_COUNT: 1
          WORKER_COUNT_WEB: 1
          WORKER_COUNT_SECSCAN: 1
          WORKER_COUNT_REGISTRY: 1
          DB_CONNECTION_POOLING: false
          CREATE_NAMESPACE_ON_PUSH: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_PROXY_STORAGE: true
          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - RadosGWStorage
              - access_key: ${ACCESS_KEY}
                secret_key: ${SECRET_KEY}
                bucket_name: ${BUCKET}
                hostname: ${ENDPOINT}
                port: 3900
                is_secure: false
                storage_path: /datastorage/registry
          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default
          DISTRIBUTED_STORAGE_PREFERENCE:
            - default
          CFGEOF
          )
          kubectl create secret generic reconcile-config -n $NAMESPACE \
            --from-literal=config.yaml="${CONFIG}" \
            --from-file=ssl.cert=/tmp/ssl-${NAMESPACE}.cert \
            --from-file=ssl.key=/tmp/ssl-${NAMESPACE}.key \
            --from-file=extra_ca_cert_e2e-ca.crt=/tmp/ssl-${NAMESPACE}.cert
          echo "Config bundle created in $NAMESPACE"
    - apply:
        file: 00-create-quay-registry.yaml
    - script:
        shell: /bin/bash
        content: |
          set -euxo pipefail

          # Verify the database is ready before dependent workloads start.
          # This catches the race condition from PROJQUAY-6578 where the
          # migration job started before postgres was available.

          # Wait for the operator to reconcile and create the deployment.
          echo "Waiting for postgres deployment to be created..."
          for i in $(seq 1 60); do
            if kubectl get deployment reconcile-quay-database -n $NAMESPACE &>/dev/null; then
              echo "Postgres deployment found"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: postgres deployment not created"; exit 1; }
            sleep 2
          done

          echo "Waiting for postgres deployment to have available replicas..."
          kubectl rollout status deployment/reconcile-quay-database -n $NAMESPACE --timeout=300s

          echo "Checking migration job status..."
          for i in $(seq 1 60); do
            JOB_STATUS=$(kubectl get job reconcile-quay-app-upgrade -n $NAMESPACE \
              -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "0")
            if [ "${JOB_STATUS}" = "1" ]; then
              echo "PASS: migration job completed successfully"
              break
            fi
            FAILED=$(kubectl get job reconcile-quay-app-upgrade -n $NAMESPACE \
              -o jsonpath='{.status.failed}' 2>/dev/null || echo "0")
            if [ "${FAILED:-0}" -gt "2" ]; then
              echo "FAIL: migration job has ${FAILED} failures — database may not have been ready"
              kubectl logs job/reconcile-quay-app-upgrade -n $NAMESPACE --tail=20 || true
              exit 1
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: migration job timeout"; exit 1; }
            sleep 5
          done

          # Verify the migration job was created AFTER the postgres deployment
          PG_CREATED=$(kubectl get deployment reconcile-quay-database -n $NAMESPACE \
            -o jsonpath='{.metadata.creationTimestamp}')
          JOB_CREATED=$(kubectl get job reconcile-quay-app-upgrade -n $NAMESPACE \
            -o jsonpath='{.metadata.creationTimestamp}')
          echo "Postgres created: ${PG_CREATED}, Job created: ${JOB_CREATED}"
          if [[ "${JOB_CREATED}" < "${PG_CREATED}" ]]; then
            echo "FAIL: migration job was created before postgres deployment"
            exit 1
          fi
          echo "PASS: migration job created after postgres deployment"
    - assert:
        file: 00-assert-overrides.yaml
    - assert:
        file: 00-assert-status.yaml
  - name: assert-route-overrides
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euxo pipefail

          if ! kubectl api-resources 2>/dev/null | grep route.openshift.io >/dev/null; then
            echo "KinD detected — skipping route override assertion (no routes)"
            exit 0
          fi

          echo "Verifying route annotation and label overrides..."
          ROUTE_JSON=$(kubectl get route reconcile-quay -n $NAMESPACE -o json)

          # Check annotation override
          A1=$(echo "${ROUTE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin)['metadata'].get('annotations',{}).get('a1',''))")
          if [ "${A1}" != "TESTING" ]; then
            echo "FAIL: expected annotation a1=TESTING, got '${A1}'"
            exit 1
          fi
          echo "PASS: annotation a1=TESTING"

          # Check label override
          L1=$(echo "${ROUTE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin)['metadata'].get('labels',{}).get('l1',''))")
          if [ "${L1}" != "TESTING" ]; then
            echo "FAIL: expected label l1=TESTING, got '${L1}'"
            exit 1
          fi
          echo "PASS: label l1=TESTING"

          # Verify existing annotations were preserved
          TIMEOUT=$(echo "${ROUTE_JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin)['metadata'].get('annotations',{}).get('haproxy.router.openshift.io/timeout',''))")
          if [ "${TIMEOUT}" != "30m" ]; then
            echo "FAIL: expected haproxy timeout annotation preserved, got '${TIMEOUT}'"
            exit 1
          fi
          echo "PASS: existing annotations preserved"
  - name: unmanage-mirror
    try:
    - apply:
        file: 01-unmanage-mirror.yaml
    - assert:
        file: 01-assert.yaml
  - name: scale-mirror
    try:
    - apply:
        file: 02-scale-mirror.yaml
    - assert:
        file: 02-assert.yaml
  - name: delete-quay-app
    try:
    - script:
        content: |
          kubectl delete deployment reconcile-quay-app -n $NAMESPACE
          echo "Deleted deployment reconcile-quay-app"
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail

          # Verify status reports quay component unavailable before operator recreates it
          echo "Checking status reports quay unavailable..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.status.conditions[?(@.type=="ComponentQuayReady")].status}' 2>/dev/null || true)
            if [ "${STATUS}" = "False" ]; then
              MSG=$(kubectl get quayregistry reconcile -n $NAMESPACE \
                -o jsonpath='{.status.conditions[?(@.type=="ComponentQuayReady")].message}' 2>/dev/null || true)
              echo "PASS: ComponentQuayReady=False, message: ${MSG}"
              break
            fi
            [ "$i" -eq 30 ] && { echo "ERROR: status did not report quay unavailable"; exit 1; }
            sleep 2
          done
    - assert:
        file: 03-assert.yaml
  - name: push-pull-image
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euxo pipefail

          # Determine registry endpoint
          if kubectl api-resources 2>/dev/null | grep route.openshift.io >/dev/null; then
            # On OpenShift (CRC), the auto-generated config does not include
            # FEATURE_USER_INITIALIZE or CREATE_NAMESPACE_ON_PUSH, so we
            # cannot create a superuser or push images via the API.
            # Skip push/pull on OpenShift; the KinD path provides a
            # user-supplied config bundle with these flags enabled.
            echo "OpenShift detected — skipping push/pull (no user-init in auto config)"
            exit 0
          else
            # KinD: create NodePort service
            if ! kubectl get svc reconcile-quay-nodeport -n $NAMESPACE &>/dev/null; then
              cat <<'SVCEOF' | sed "s/REPLACE_NS/$NAMESPACE/g" | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: reconcile-quay-nodeport
            namespace: REPLACE_NS
          spec:
            type: NodePort
            selector:
              quay-component: quay-app
              quay-operator/quayregistry: reconcile
            ports:
            - name: https
              port: 8443
              targetPort: 8443
              nodePort: 30443
              protocol: TCP
          SVCEOF
            fi
            ENDPOINT="https://127.0.0.1:30443"
            CRANE_FLAGS="--insecure"
            echo "KinD: using NodePort ${ENDPOINT}"
          fi

          # Wait for Quay API
          echo "Waiting for Quay API..."
          for i in $(seq 1 30); do
            if curl -sk "${ENDPOINT}/api/v1/discovery" >/dev/null 2>&1; then
              echo "Quay API responding"
              break
            fi
            [ "$i" -eq 30 ] && { echo "ERROR: Quay API timeout"; exit 1; }
            sleep 2
          done

          # Initialize superuser
          echo "Initializing superuser..."
          INIT_RESP=$(curl -sk "${ENDPOINT}/api/v1/user/initialize" \
            -X POST -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"password123","email":"admin@test.com","access_token":true}')
          TOKEN=$(echo "${INIT_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || true)
          [ -z "${TOKEN}" ] && echo "WARNING: no access token (user may exist)"

          REGISTRY=$(echo "${ENDPOINT}" | sed 's|https://||')

          # Authenticate crane with Quay registry
          crane auth login ${CRANE_FLAGS} "${REGISTRY}" -u admin -p password123

          # Push (retry — Quay storage may need a moment after pod recreation)
          echo "Pushing busybox to ${REGISTRY}/admin/e2e-test:latest..."
          PUSH_OK=false
          for attempt in $(seq 1 5); do
            if crane copy ${CRANE_FLAGS} --platform linux/amd64 \
              quay.io/quay/busybox:latest "${REGISTRY}/admin/e2e-test:latest"; then
              echo "Push succeeded on attempt ${attempt}"
              PUSH_OK=true
              break
            fi
            echo "Push attempt ${attempt} failed, retrying in 10s..."
            sleep 10
          done
          ${PUSH_OK} || { echo "ERROR: crane copy failed after 5 attempts"; exit 1; }

          # Verify tag is queryable via the registry API
          PUSH_DIGEST=$(crane digest ${CRANE_FLAGS} "${REGISTRY}/admin/e2e-test:latest")
          echo "PASS: push verified digest=${PUSH_DIGEST}"
  - name: clair-config-validation
    try:
    - script:
        shell: /bin/bash
        timeout: 2m0s
        content: |
          set -euxo pipefail

          # Skip on OpenShift (same reason as push-pull-image)
          if kubectl api-resources 2>/dev/null | grep route.openshift.io >/dev/null; then
            echo "OpenShift detected — skipping Clair config validation"
            exit 0
          fi

          # Verify the generated clair config has the correct updater
          # set names by inspecting the config secret.
          # Note: On KinD the updaters themselves cannot reach external
          # sources because the cluster-trusted-ca ConfigMap mount
          # shadows the container's system CAs with an empty file
          # (no CA injection operator like on OpenShift). Updater TLS
          # errors are expected — we validate config generation only.
          CONFIG_SECRET=$(kubectl get secret -n $NAMESPACE -o name \
            | grep "clair-config-secret" | head -1)
          if [ -z "${CONFIG_SECRET}" ]; then
            echo "ERROR: no clair-config-secret found"
            exit 1
          fi

          CLAIR_CFG=$(kubectl get ${CONFIG_SECRET} -n $NAMESPACE \
            -o jsonpath='{.data.config\.yaml}' | base64 -d 2>/dev/null || true)
          if [ -z "${CLAIR_CFG}" ]; then
            echo "ERROR: config.yaml not found in ${CONFIG_SECRET}"
            exit 1
          fi

          if echo "${CLAIR_CFG}" | grep -q "rhel-vex"; then
            echo "PASS: Clair config uses rhel-vex updater name"
          elif echo "${CLAIR_CFG}" | grep -q "rhel:"; then
            echo "ERROR: Clair config still uses old 'rhel' updater name"
            exit 1
          else
            echo "ERROR: Clair config has no recognized RHEL updater (expected 'rhel-vex')"
            exit 1
          fi

          if echo "${CLAIR_CFG}" | grep -q "sets:"; then
            echo "PASS: Clair config has explicit updater sets"
          else
            echo "WARNING: Clair config does not have explicit updater sets"
          fi
  - name: remanage-mirror
    try:
    - apply:
        file: 05-remanage-mirror.yaml
    - assert:
        file: 05-assert.yaml
  - name: scale-to-zero
    try:
    - apply:
        file: 06-scale-to-zero.yaml
    - assert:
        file: 06-assert.yaml
  - name: restore-mirror
    try:
    - apply:
        file: 07-restore-mirror.yaml
    - assert:
        file: 07-assert.yaml
  - name: delete-clair-app
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail
          kubectl delete deployment reconcile-clair-app -n $NAMESPACE
          echo "Deleted deployment reconcile-clair-app"
          echo "Waiting for status to report clair unavailable..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.status.conditions[?(@.type=="ComponentClairReady")].status}' 2>/dev/null || true)
            if [ "${STATUS}" = "False" ]; then
              MSG=$(kubectl get quayregistry reconcile -n $NAMESPACE \
                -o jsonpath='{.status.conditions[?(@.type=="ComponentClairReady")].message}' 2>/dev/null || true)
              echo "PASS: ComponentClairReady=False, message: ${MSG}"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: status did not report clair unavailable"; exit 1; }
            sleep 3
          done
    - assert:
        file: 00-assert-status.yaml
  - name: delete-mirror
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail
          kubectl delete deployment reconcile-quay-mirror -n $NAMESPACE
          echo "Deleted deployment reconcile-quay-mirror"
          echo "Waiting for status to report mirror unavailable..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.status.conditions[?(@.type=="ComponentMirrorReady")].status}' 2>/dev/null || true)
            if [ "${STATUS}" = "False" ]; then
              MSG=$(kubectl get quayregistry reconcile -n $NAMESPACE \
                -o jsonpath='{.status.conditions[?(@.type=="ComponentMirrorReady")].message}' 2>/dev/null || true)
              echo "PASS: ComponentMirrorReady=False, message: ${MSG}"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: status did not report mirror unavailable"; exit 1; }
            sleep 3
          done
    - assert:
        file: 00-assert-status.yaml
  - name: delete-redis
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail
          kubectl delete deployment reconcile-quay-redis -n $NAMESPACE
          echo "Deleted deployment reconcile-quay-redis"
          echo "Waiting for status to report redis unavailable..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.status.conditions[?(@.type=="ComponentRedisReady")].status}' 2>/dev/null || true)
            if [ "${STATUS}" = "False" ]; then
              MSG=$(kubectl get quayregistry reconcile -n $NAMESPACE \
                -o jsonpath='{.status.conditions[?(@.type=="ComponentRedisReady")].message}' 2>/dev/null || true)
              echo "PASS: ComponentRedisReady=False, message: ${MSG}"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: status did not report redis unavailable"; exit 1; }
            sleep 3
          done
    - assert:
        file: 00-assert-status.yaml
  - name: delete-postgres
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail
          kubectl delete deployment reconcile-quay-database -n $NAMESPACE
          echo "Deleted deployment reconcile-quay-database"
          echo "Waiting for status to report postgres unavailable..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.status.conditions[?(@.type=="ComponentPostgresReady")].status}' 2>/dev/null || true)
            if [ "${STATUS}" = "False" ]; then
              MSG=$(kubectl get quayregistry reconcile -n $NAMESPACE \
                -o jsonpath='{.status.conditions[?(@.type=="ComponentPostgresReady")].message}' 2>/dev/null || true)
              echo "PASS: ComponentPostgresReady=False, message: ${MSG}"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: status did not report postgres unavailable"; exit 1; }
            sleep 3
          done
    - assert:
        file: 00-assert-status.yaml
  - name: rotate-config
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euxo pipefail

          # Record the current config secret name
          OLD_SECRET=$(kubectl get secret -n $NAMESPACE -o name \
            | grep "reconcile-quay-config-secret" | head -1 || true)
          echo "Current config secret: ${OLD_SECRET}"

          if [ -z "${OLD_SECRET}" ]; then
            echo "ERROR: no config secret found"
            exit 1
          fi

          # Ensure config bundle secret exists (on OpenShift it may not)
          if ! kubectl get secret reconcile-config -n $NAMESPACE &>/dev/null; then
            echo "Creating config bundle secret for OpenShift..."
            kubectl create secret generic reconcile-config -n $NAMESPACE \
              --from-literal=config.yaml="FEATURE_MAILING: false"
            kubectl patch quayregistry reconcile -n $NAMESPACE --type=merge \
              -p '{"spec":{"configBundleSecret":"reconcile-config"}}'
            # Wait for reconcile to settle with the new config bundle
            echo "Waiting for reconcile to settle..."
            sleep 30
            # Re-record after settle since the secret name may have changed
            OLD_SECRET=$(kubectl get secret -n $NAMESPACE -o name \
              | grep "reconcile-quay-config-secret" | head -1 || true)
            echo "Config secret after settle: ${OLD_SECRET}"
          fi

          # Patch the config bundle to trigger config rotation
          # Add a new key that doesn't exist in the original config
          CONFIG=$(kubectl get secret reconcile-config -n $NAMESPACE \
            -o jsonpath='{.data.config\.yaml}' | base64 -d)
          UPDATED_CONFIG=$(printf '%s\nTAGGING_DISABLED: true\n' "${CONFIG}")
          kubectl patch secret reconcile-config -n $NAMESPACE --type=merge \
            -p "{\"data\":{\"config.yaml\":\"$(echo -n "${UPDATED_CONFIG}" | base64 -w0)\"}}"
          echo "Config bundle patched"

          # Wait for the operator to create a new config secret
          echo "Waiting for config secret rotation..."
          for i in $(seq 1 60); do
            NEW_SECRET=$(kubectl get secret -n $NAMESPACE -o name \
              | grep "reconcile-quay-config-secret" | head -1 || true)
            if [ -n "${NEW_SECRET}" ] && [ "${NEW_SECRET}" != "${OLD_SECRET}" ]; then
              echo "PASS: config secret rotated: ${OLD_SECRET} -> ${NEW_SECRET}"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: config secret rotation timeout"; exit 1; }
            sleep 5
          done

          # Verify only one config secret exists (old one was cleaned up)
          COUNT=$(kubectl get secret -n $NAMESPACE -o name \
            | grep -c "reconcile-quay-config-secret" || true)
          if [ "${COUNT}" -ne 1 ]; then
            echo "ERROR: expected 1 config secret, found ${COUNT}"
            kubectl get secret -n $NAMESPACE -o name | grep "reconcile-quay-config-secret" || true
            exit 1
          fi
          echo "PASS: old config secret cleaned up, ${COUNT} config secret(s) remain"
    - assert:
        file: 08-assert.yaml
  - name: switch-external-tls
    timeouts:
      exec: 15m0s
      assert: 5m0s
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail

          # Record generation before apply so we can detect when the operator
          # has reconciled the new spec (gate 1).
          OLD_GEN=$(kubectl get quayregistry reconcile -n $NAMESPACE \
            -o jsonpath='{.metadata.generation}')
          echo "Pre-apply generation: ${OLD_GEN}"
          echo "${OLD_GEN}" > /tmp/pre-switch-generation

          # Determine the SAN for the certificate based on platform.
          # On OpenShift the operator derives SERVER_HOSTNAME from the route:
          #   {name}-quay-{namespace}.{apps_domain}
          # The cert must be valid for that hostname or kustomize rejects it.
          # On KinD, SERVER_HOSTNAME is 127.0.0.1:30443 from the config bundle.
          if kubectl get ingresses.config.openshift.io cluster &>/dev/null; then
            APPS_DOMAIN=$(kubectl get ingresses.config.openshift.io cluster \
              -o jsonpath='{.spec.domain}')
            ROUTE_HOST="reconcile-quay-${NAMESPACE}.${APPS_DOMAIN}"
            SAN="DNS:${ROUTE_HOST}"
            echo "OpenShift detected: SAN=${SAN}"
          else
            SAN="IP:127.0.0.1,DNS:localhost"
            echo "KinD detected: SAN=${SAN}"
          fi

          # Generate self-signed TLS certificate for external TLS secret
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
            -keyout /tmp/external-tls.key -out /tmp/external-tls.crt -days 1 \
            -subj "/O=Quay E2E/CN=external-tls" \
            -addext "subjectAltName=${SAN}" 2>/dev/null
          echo "Generated external TLS certificate"

          # Create kubernetes.io/tls secret
          kubectl create secret tls reconcile-external-tls -n $NAMESPACE \
            --cert=/tmp/external-tls.crt --key=/tmp/external-tls.key
          echo "Created external TLS secret"

          # Remove ssl.cert and ssl.key from config bundle (mutually exclusive with secretRef)
          if kubectl get secret reconcile-config -n $NAMESPACE -o jsonpath='{.data}' | grep -q ssl; then
            kubectl get secret reconcile-config -n $NAMESPACE -o json \
              | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          d['data'].pop('ssl.cert', None)
          d['data'].pop('ssl.key', None)
          json.dump(d, sys.stdout)
          " | kubectl replace -f -
            echo "Removed ssl.cert/ssl.key from config bundle"
          else
            echo "Config bundle has no ssl.cert/ssl.key, no patch needed"
          fi
    - apply:
        file: 09-switch-external-tls.yaml
    - assert:
        file: 09-assert-tls-label.yaml
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail
          OLD_GEN=$(cat /tmp/pre-switch-generation)

          # Gate 1: Wait for the operator to reconcile the new spec.
          echo "Gate 1: waiting for observedGeneration > ${OLD_GEN}..."
          for i in $(seq 1 120); do
            GEN=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.metadata.generation}' 2>/dev/null || echo "0")
            OBS=$(kubectl get quayregistry reconcile -n $NAMESPACE \
              -o jsonpath='{.status.observedGeneration}' 2>/dev/null || echo "0")
            if [ "${GEN}" -gt "${OLD_GEN}" ] && [ "${OBS}" -ge "${GEN}" ]; then
              echo "Gate 1 passed: generation=${GEN} observedGeneration=${OBS}"
              break
            fi
            [ "$i" -eq 120 ] && { echo "ERROR: observedGeneration not updated after 10m"; exit 1; }
            sleep 5
          done

          # Gate 2: Wait for tls-secret-hash annotation on quay-app deployment.
          echo "Gate 2: waiting for tls-secret-hash annotation..."
          for i in $(seq 1 60); do
            HASH=$(kubectl get deployment reconcile-quay-app -n $NAMESPACE \
              -o jsonpath='{.spec.template.metadata.annotations.quay\.redhat\.com/tls-secret-hash}' 2>/dev/null || true)
            if [ -n "${HASH}" ]; then
              echo "Gate 2 passed: tls-secret-hash=${HASH}"
              echo "${HASH}" > /tmp/initial-tls-hash
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: tls-secret-hash annotation not found after 5m"; exit 1; }
            sleep 5
          done

          # Gate 3: Wait for rollouts to complete.
          echo "Gate 3: waiting for deployment rollouts..."
          kubectl rollout status deployment/reconcile-quay-app -n $NAMESPACE --timeout=600s
          echo "quay-app rollout complete"
          kubectl rollout status deployment/reconcile-clair-app -n $NAMESPACE --timeout=600s || true
          echo "clair-app rollout complete (or timed out)"
    - assert:
        file: 00-assert-status.yaml
  - name: rotate-external-tls
    timeouts:
      exec: 15m0s
      assert: 5m0s
    try:
    - script:
        shell: /bin/bash
        content: |
          set -euo pipefail
          OLD_HASH=$(cat /tmp/initial-tls-hash)
          echo "Old TLS hash: ${OLD_HASH}"

          # Determine SAN (same logic as switch-external-tls step)
          if kubectl get ingresses.config.openshift.io cluster &>/dev/null; then
            APPS_DOMAIN=$(kubectl get ingresses.config.openshift.io cluster \
              -o jsonpath='{.spec.domain}')
            SAN="DNS:reconcile-quay-${NAMESPACE}.${APPS_DOMAIN}"
          else
            SAN="IP:127.0.0.1,DNS:localhost"
          fi

          # Generate a new cert (different key material produces different hash)
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
            -keyout /tmp/external-tls-rotated.key -out /tmp/external-tls-rotated.crt -days 1 \
            -subj "/O=Quay E2E/CN=rotated" \
            -addext "subjectAltName=${SAN}" 2>/dev/null

          # Update the external TLS secret
          kubectl create secret tls reconcile-external-tls -n $NAMESPACE \
            --cert=/tmp/external-tls-rotated.crt --key=/tmp/external-tls-rotated.key \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "External TLS secret updated with rotated certificate"

          # Gate 2: Wait for hash annotation to change on quay-app deployment.
          echo "Gate 2: waiting for TLS hash rotation..."
          for i in $(seq 1 60); do
            NEW_HASH=$(kubectl get deployment reconcile-quay-app -n $NAMESPACE \
              -o jsonpath='{.spec.template.metadata.annotations.quay\.redhat\.com/tls-secret-hash}' 2>/dev/null || true)
            if [ -n "${NEW_HASH}" ] && [ "${NEW_HASH}" != "${OLD_HASH}" ]; then
              echo "Gate 2 passed: hash rotated ${OLD_HASH} -> ${NEW_HASH}"
              break
            fi
            [ "$i" -eq 60 ] && { echo "ERROR: TLS hash rotation timeout after 5m"; exit 1; }
            sleep 5
          done

          # Verify clair-app also has the same new hash
          if kubectl get deployment reconcile-clair-app -n $NAMESPACE &>/dev/null; then
            CLAIR_HASH=$(kubectl get deployment reconcile-clair-app -n $NAMESPACE \
              -o jsonpath='{.spec.template.metadata.annotations.quay\.redhat\.com/tls-secret-hash}' 2>/dev/null || true)
            if [ "${CLAIR_HASH}" != "${NEW_HASH}" ]; then
              echo "ERROR: clair-app hash (${CLAIR_HASH}) != quay-app hash (${NEW_HASH})"
              exit 1
            fi
            echo "All deployments have consistent rotated hash"
          fi

          # Gate 3: Wait for rollouts to complete.
          echo "Gate 3: waiting for deployment rollouts..."
          kubectl rollout status deployment/reconcile-quay-app -n $NAMESPACE --timeout=600s
          echo "quay-app rollout complete"
          kubectl rollout status deployment/reconcile-clair-app -n $NAMESPACE --timeout=600s || true
          echo "clair-app rollout complete (or timed out)"
    - assert:
        file: 00-assert-status.yaml
