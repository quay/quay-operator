---
apiVersion: v1
kind: Service
metadata:
  name: external-redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    protocol: TCP
    targetPort: 6379
  selector:
    app: external-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-redis
  template:
    metadata:
      labels:
        app: external-redis
    spec:
      containers:
      - name: redis
        image: quay.io/sclorg/redis-6-c9s:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
