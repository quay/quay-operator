apiVersion: cloudcredential.openshift.io/v1
kind: CredentialsRequest
metadata:
  name: test-quay-app
  ownerReferences:
    - kind: QuayRegistry
      name: test
spec:
  secretRef:
    name: test-quay-app-aws
  serviceAccountNames:
    - test-quay-app
  cloudTokenPath: /var/run/secrets/openshift/serviceaccount/token
